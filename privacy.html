<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Crono — Privacy Policy</title>
<style>
  :root {
    --bg:#0b0f14; --panel:#141b24; --border:#28333f; --text:#e6edf3; --muted:#8b97a6; --primary:#a3e635;
    --font-ui: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--text); font-family:var(--font-ui); line-height:1.6; }
  .wrap { max-width:760px; margin:0 auto; padding:24px 16px 48px; }
  a { color:var(--primary); }
  .back { display:inline-block; margin-bottom:16px; font-size:.9rem; }
  h1 { font-size:1.7rem; margin:0 0 4px; }
  .updated { color:var(--muted); font-size:.85rem; margin-bottom:24px; }
  .doc { background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:24px; }
  .doc h2 { font-size:1.1rem; margin:22px 0 8px; }
  .doc p, .doc li { color:var(--text); }
  .doc .muted { color:var(--muted); }
  .placeholder { border:1px dashed var(--border); border-radius:10px; padding:16px; color:var(--muted); }
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="index.html">← Back to Crono</a>
  <h1>Privacy Policy</h1>
  <div class="updated">Last updated: <!-- TODO: date --></div>
  <div class="doc">
    <!-- TODO: Replace the placeholder below with the Privacy Policy text provided by the owner. -->
    <div class="placeholder">
      The Privacy Policy text will be published here. (Awaiting final wording.)
    </div>
  </div>
</div>
</body>
</html>
